<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Stackly — Create Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <link rel="stylesheet" href="signup.css">
  <style>
    /* ════════════════════════════════════════════════════════
       LOGO SIZE INCREASES – desktop → tablet → mobile
       NOW MATCHING index.html
    ════════════════════════════════════════════════════════ */

    /* ─── Desktop logo ─── */
    .logo-wrapper {
        width: 180px;
        height: 82px;
        display: inline-block;
        flex-shrink: 0;
        margin-bottom: 0.5rem;
    }
    .logo-wrapper img {
        width: 100%;
        height: 100%;
        object-fit: contain;
    }

    /* ─── TABLET (≤768px) – BIGGER ─── */
    @media (max-width: 768px) {
        .logo-wrapper {
            width: 170px;
            height: 78px;
        }
    }

    /* ─── MOBILE PHONE (≤480px) – BIGGEST ─── */
    @media (max-width: 480px) {
        .logo-wrapper {
            width: 150px;
            height: 70px;
        }
    }
  </style>
</head>
<body>
  <div id="particles" class="particles"></div>
  <a href="login.html" class="back-btn"><i class="ph ph-arrow-left"></i> Back to Sign In</a>

  <div class="signup-container">
    <div class="form-card">
      <div class="form-header">
        <a href="index.html" class="logo-wrapper">
          <img src="logo-removebg-preview.webp" alt="Stackly" class="nav-logo-mask" />
        </a>
        <h2>Create account</h2>
        <p>Join the Stackly Research Network</p>
      </div>

      <div class="form-fields">
        <div class="field-row">
          <div class="field-group">
            <label for="firstName">First name <span class="required">*</span></label>
            <div class="input-wrap">
              <i class="ph ph-user"></i>
              <input type="text" id="firstName" placeholder="John" required>
            </div>
          </div>
          <div class="field-group">
            <label for="lastName">Last name</label>
            <div class="input-wrap">
              <i class="ph ph-user"></i>
              <input type="text" id="lastName" placeholder="Doe">
            </div>
          </div>
        </div>

        <div class="field-group">
          <label for="signupEmail">Email address <span class="required">*</span></label>
          <div class="input-wrap">
            <i class="ph ph-envelope"></i>
            <input type="email" id="signupEmail" placeholder="you@stackly.org" required>
          </div>
        </div>

        <div class="field-group">
          <label for="signupPassword">Password <span class="required">*</span></label>
          <div class="input-wrap">
            <i class="ph ph-lock-key"></i>
            <input type="password" id="signupPassword" placeholder="Create a password" required>
            <button type="button" class="toggle-pw" id="togglePw"><i class="ph ph-eye" id="pwIcon"></i></button>
          </div>
          <div class="pw-strength"><div class="pw-bar" id="pwBar"></div></div>
          <span class="pw-label" id="pwLabel"></span>
        </div>

        <div class="field-group">
          <label for="confirmPassword">Confirm password <span class="required">*</span></label>
          <div class="input-wrap">
            <i class="ph ph-lock-key"></i>
            <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
            <button type="button" class="toggle-pw" id="toggleConfirmPw"><i class="ph ph-eye" id="confirmPwIcon"></i></button>
          </div>
          <span class="error-msg" id="confirmError"></span>
        </div>

        <div class="field-group">
          <label for="organization">Organization (optional)</label>
          <div class="input-wrap">
            <i class="ph ph-buildings"></i>
            <input type="text" id="organization" placeholder="Your institution">
          </div>
        </div>

        <div class="field-group">
          <label for="roleSelect">Account role <span class="required">*</span></label>
          <div class="input-wrap">
            <i class="ph ph-briefcase"></i>
            <select id="roleSelect" required>
              <option value="">Select role</option>
              <option value="viewer">Viewer – View research dashboards & reports</option>
              <option value="admin">Admin – Full management access</option>
            </select>
          </div>
        </div>

        <div class="error-message" id="formError"></div>

        <button class="btn-create" id="createBtn">
          <span>Create Account</span>
          <i class="ph ph-arrow-right"></i>
        </button>
      </div>

      <p class="login-prompt">Already have an account? <a href="login.html" class="login-link">Sign in</a></p>
    </div>
  </div>

  <script src="signup.js"></script>
</body>
</html>
