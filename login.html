<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Stackly — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div id="particles" class="particles"></div>
  <a href="index.html" class="back-btn"><i class="ph ph-arrow-left"></i> Back to Home</a>

  <div class="login-container">
    <div class="form-card">
      <div class="form-header">
  <a href="index.html" class="logo-wrapper">
                <img src="logo-removebg-preview.webp" alt="Stackly" class="nav-logo-mask" />
            </a>
        <h2>Welcome back</h2>
        <p>Sign in to the Stackly Research Network</p>
      </div>

      <div class="form-fields">
        <div class="field-group">
          <label for="username">Username <span class="required">*</span></label>
          <div class="input-wrap">
            <i class="ph ph-user-circle"></i>
            <input type="text" id="username" placeholder="Enter your username" required>
          </div>
        </div>

        <div class="field-group">
          <label for="email">Email address <span class="required">*</span></label>
          <div class="input-wrap">
            <i class="ph ph-envelope"></i>
            <input type="email" id="email" placeholder="you@stackly.org" required>
          </div>
        </div>

        <div class="field-group">
          <label for="password">Password <span class="required">*</span></label>
          <div class="input-wrap">
            <i class="ph ph-lock-key"></i>
            <input type="password" id="password" placeholder="Enter password" required>
            <button type="button" class="toggle-pw" id="togglePw"><i class="ph ph-eye" id="pwIcon"></i></button>
          </div>
        </div>

        <div class="field-group">
          <label for="roleSelect">Account role <span class="required">*</span></label>
          <div class="input-wrap">
            <i class="ph ph-briefcase"></i>
            <select id="roleSelect" required>
              <option value="">Select role</option>
              <option value="viewer">Viewer – View research dashboards & reports</option>
              <option value="admin">Admin – Full management access</option>
            </select>
          </div>
        </div>

        <div class="form-meta">
          <label class="remember-label">
            <input type="checkbox" id="remember"> Remember me
          </label>
          <a href="404.html" class="forgot-link">Forgot password?</a>
        </div>

        <div class="error-message" id="formError"></div>

        <button class="btn-signin" id="signinBtn">
          <span>Sign In</span>
          <i class="ph ph-arrow-right"></i>
        </button>

        <div class="divider"><span>or continue with</span></div>

        <div class="social-btns">
          <a href="404.html" class="social-btn"><i class="ph ph-google-logo"></i> Google</a>
          <a href="404.html" class="social-btn"><i class="ph ph-instagram-logo"></i> Instagram</a>
          <a href="404.html" class="social-btn"><i class="ph ph-linkedin-logo"></i> LinkedIn</a>
        </div>
      </div>

      <p class="signup-prompt">New to Stackly? <a href="signup.html" class="signup-link">Create account</a></p>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
